name: SQL Lint

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  sqlfluff:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install SQLFluff
        run: |
          pip install sqlfluff

      - name: Run SQLFluff
        run: |
          sqlfluff lint sql/