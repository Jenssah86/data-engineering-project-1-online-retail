name: CI Pipeline # This workflow runs on push and pull request events to ensure code quality and functionality

on:
  push:
    branches: [main] # Trigger the workflow on pushes to the main branch
  pull_request:
    branches: [main] # Trigger the workflow on pull requests targeting the main branch

jobs:
  build:
    runs-on: ubuntu-latest # Use the latest version of Ubuntu for the workflow

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3 # Check out the repository to the runner

      - name: Set up Python # Set up Python 3.10 for the workflow
        uses: actions/setup-python@v4 # Use the setup-python action to set up Python 3.10
        with:
          python-version: '3.10'

      - name: Install dependencies # Install flake8 and pytest for linting and testing
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint with flake8 # Check for syntax errors and code style issues
        run: |
          flake8 python --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 python --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Run tests # Run the test suite using pytest
        run: |
          pytest
        